services:
  storefront-dev:
    build: .
    restart: unless-stopped
    expose:
      - "80"
    environment:
      - BACKEND_HOST=sc-backend-dev
    labels:
      - "traefik.enable=true"
      - 'traefik.http.routers.stricktly-coffee-dev-${DOKPLOY_COMPOSE_ID_SC}.rule=HostRegexp(`^[a-z0-9-]+\.${DOMAIN}$`)${DEV_ROUTE_RULE}'
      - "traefik.http.routers.stricktly-coffee-dev-${DOKPLOY_COMPOSE_ID_SC}.entrypoints=websecure"
      - "traefik.http.routers.stricktly-coffee-dev-${DOKPLOY_COMPOSE_ID_SC}.tls.certresolver=letsencrypt"
      - "traefik.http.routers.stricktly-coffee-dev-${DOKPLOY_COMPOSE_ID_SC}.priority=20"
      - "traefik.http.services.stricktly-coffee-dev-${DOKPLOY_COMPOSE_ID_SC}.loadbalancer.server.port=80"
      - 'traefik.http.routers.stricktly-coffee-dev-${DOKPLOY_COMPOSE_ID_SC}-http.rule=HostRegexp(`^[a-z0-9-]+\.${DOMAIN}$`)${DEV_ROUTE_RULE}'
      - "traefik.http.routers.stricktly-coffee-dev-${DOKPLOY_COMPOSE_ID_SC}-http.entrypoints=web"
      - "traefik.http.routers.stricktly-coffee-dev-${DOKPLOY_COMPOSE_ID_SC}-http.priority=20"
      - "traefik.http.routers.stricktly-coffee-dev-${DOKPLOY_COMPOSE_ID_SC}-http.middlewares=redirect-to-https-dev-${DOKPLOY_COMPOSE_ID_SC}"
      - "traefik.http.middlewares.redirect-to-https-dev-${DOKPLOY_COMPOSE_ID_SC}.redirectscheme.scheme=https"
    networks:
      - dokploy-network
    depends_on:
      - sc-backend-dev

  sc-backend-dev:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    environment:
      - PORT=3000
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - SHOPIFY_SHOP_NAME=${SHOPIFY_SHOP_NAME}
      - SHOPIFY_ACCESS_TOKEN=${SHOPIFY_ACCESS_TOKEN}
      - SHOPIFY_CLIENT_ID=${SHOPIFY_CLIENT_ID}
      - SHOPIFY_CLIENT_SECRET=${SHOPIFY_CLIENT_SECRET}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - S3_ENDPOINT=${S3_ENDPOINT}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY}
      - S3_SECRET_KEY=${S3_SECRET_KEY}
      - S3_BUCKET_MEDIA=${S3_BUCKET_MEDIA}
      - GEMINI_API_KEY_GENERAL=${GEMINI_API_KEY_GENERAL}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GOOGLE_ADS_DEVELOPER_TOKEN=${GOOGLE_ADS_DEVELOPER_TOKEN}
      - GOOGLE_ADS_CUSTOMER_ID=${GOOGLE_ADS_CUSTOMER_ID}
      - GOOGLE_ADS_CLIENT_ID=${GOOGLE_ADS_CLIENT_ID}
      - GOOGLE_ADS_CLIENT_SECRET=${GOOGLE_ADS_CLIENT_SECRET}
      - GOOGLE_ADS_REFRESH_TOKEN=${GOOGLE_ADS_REFRESH_TOKEN}
      - META_CLIENT_ID=${META_CLIENT_ID}
      - META_CLIENT_SECRET=${META_CLIENT_SECRET}
      - THREADS_CLIENT_ID=${THREADS_CLIENT_ID}
      - THREADS_CLIENT_SECRET=${THREADS_CLIENT_SECRET}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - SMTP_FROM=${SMTP_FROM}
      - BRAND_STYLED_DASHBOARD_ENABLED=${BRAND_STYLED_DASHBOARD_ENABLED:-false}
    volumes:
      - uploads_data:/app/uploads
    networks:
      - dokploy-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.sc-api-dev-${DOKPLOY_COMPOSE_ID_SC}.rule=Host(`${API_DOMAIN}`)"
      - "traefik.http.routers.sc-api-dev-${DOKPLOY_COMPOSE_ID_SC}.entrypoints=websecure"
      - "traefik.http.routers.sc-api-dev-${DOKPLOY_COMPOSE_ID_SC}.tls.certresolver=letsencrypt"
      - "traefik.http.services.sc-api-dev-${DOKPLOY_COMPOSE_ID_SC}.loadbalancer.server.port=3000"
      - "traefik.http.routers.sc-api-dev-${DOKPLOY_COMPOSE_ID_SC}-http.rule=Host(`${API_DOMAIN}`)"
      - "traefik.http.routers.sc-api-dev-${DOKPLOY_COMPOSE_ID_SC}-http.entrypoints=web"
      - "traefik.http.routers.sc-api-dev-${DOKPLOY_COMPOSE_ID_SC}-http.middlewares=redirect-to-https-dev-${DOKPLOY_COMPOSE_ID_SC}"
    depends_on:
      - postgres-db-dev
      - minio-dev

  postgres-db-dev:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - dokploy-network

  web-dashboard-dev:
    build:
      context: .
      dockerfile: Dockerfile.dash
    restart: unless-stopped
    expose:
      - "80"
    environment:
      - BACKEND_HOST=sc-backend-dev
      - MINIO_HOST=minio-dev
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.web-dashboard-dev-${DOKPLOY_COMPOSE_ID_SC}.rule=Host(`${DASH_DOMAIN}`)"
      - "traefik.http.routers.web-dashboard-dev-${DOKPLOY_COMPOSE_ID_SC}.entrypoints=websecure"
      - "traefik.http.routers.web-dashboard-dev-${DOKPLOY_COMPOSE_ID_SC}.tls.certresolver=letsencrypt"
      - "traefik.http.services.web-dashboard-dev-${DOKPLOY_COMPOSE_ID_SC}.loadbalancer.server.port=80"
      - "traefik.http.routers.web-dashboard-dev-${DOKPLOY_COMPOSE_ID_SC}-http.rule=Host(`${DASH_DOMAIN}`)"
      - "traefik.http.routers.web-dashboard-dev-${DOKPLOY_COMPOSE_ID_SC}-http.entrypoints=web"
      - "traefik.http.routers.web-dashboard-dev-${DOKPLOY_COMPOSE_ID_SC}-http.middlewares=redirect-to-https-dev-dashboard-${DOKPLOY_COMPOSE_ID_SC}"
      - "traefik.http.middlewares.redirect-to-https-dev-dashboard-${DOKPLOY_COMPOSE_ID_SC}.redirectscheme.scheme=https"
    networks:
      - dokploy-network
    depends_on:
      - sc-backend-dev

  minio-dev:
    image: minio/minio:latest
    restart: unless-stopped
    expose:
      - "9000"
      - "9001"
    environment:
      - MINIO_ROOT_USER=${S3_ACCESS_KEY}
      - MINIO_ROOT_PASSWORD=${S3_SECRET_KEY}
    command: server /data --console-address ":9001"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.minio-console-dev-${DOKPLOY_COMPOSE_ID_SC}.rule=Host(`${S3_CONSOLE_DOMAIN}`)"
      - "traefik.http.routers.minio-console-dev-${DOKPLOY_COMPOSE_ID_SC}.entrypoints=websecure"
      - "traefik.http.routers.minio-console-dev-${DOKPLOY_COMPOSE_ID_SC}.tls.certresolver=letsencrypt"
      - "traefik.http.services.minio-console-dev-${DOKPLOY_COMPOSE_ID_SC}.loadbalancer.server.port=9001"
      - "traefik.http.routers.minio-console-dev-${DOKPLOY_COMPOSE_ID_SC}-http.rule=Host(`${S3_CONSOLE_DOMAIN}`)"
      - "traefik.http.routers.minio-console-dev-${DOKPLOY_COMPOSE_ID_SC}-http.entrypoints=web"
      - "traefik.http.routers.minio-console-dev-${DOKPLOY_COMPOSE_ID_SC}-http.middlewares=redirect-to-https-dev-minio-${DOKPLOY_COMPOSE_ID_SC}"
      - "traefik.http.middlewares.redirect-to-https-dev-minio-${DOKPLOY_COMPOSE_ID_SC}.redirectscheme.scheme=https"
    volumes:
      - minio_data:/data
    networks:
      - dokploy-network

  database-backup-dev:
    build:
      context: .
      dockerfile: Dockerfile.backup
    restart: unless-stopped
    environment:
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - S3_ENDPOINT=${S3_ENDPOINT}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY}
      - S3_SECRET_KEY=${S3_SECRET_KEY}
      - S3_BUCKET_BACKUPS=${S3_BUCKET_BACKUPS}
      - BACKUP_INTERVAL_HOURS=12
      - RUN_ONCE=false
    networks:
      - dokploy-network
    depends_on:
      - postgres-db-dev
      - minio-dev

volumes:
  postgres_data:
  uploads_data:
  minio_data:

networks:
  dokploy-network:
    external: true
