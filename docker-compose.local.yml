services:
  web:
    build: .
    restart: unless-stopped
    container_name: web-local
    ports:
      - "80:80"
    volumes:
      - ./web:/usr/share/nginx/html/web:ro
      - ./store:/usr/share/nginx/html/store:ro
    depends_on:
      - sc-backend-core

  sc-backend-core:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    container_name: backend-core-local
    ports:
      - "3000:3000"
    command: node --watch index.js
    volumes:
      - ./server:/app
      - /app/node_modules
    environment:
      - PORT=3000
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - SHOPIFY_SHOP_NAME=${SHOPIFY_SHOP_NAME}
      - SHOPIFY_ACCESS_TOKEN=${SHOPIFY_ACCESS_TOKEN}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - S3_ENDPOINT=${S3_ENDPOINT}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY}
      - S3_SECRET_KEY=${S3_SECRET_KEY}
      - S3_BUCKET_MEDIA=${S3_BUCKET_MEDIA}
    depends_on:
      - postgres-db
      - minio

  postgres-db:
    image: postgres:16-alpine
    restart: unless-stopped
    container_name: postgres-db-local
    ports:
      - "5435:5432"
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - postgres_data_local:/var/lib/postgresql/data

  web-dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dash
    restart: unless-stopped
    container_name: web-dashboard-local
    ports:
      - "8082:80"
    volumes:
      - ./admin/dist:/usr/share/nginx/html/admin:ro
      - ./store:/usr/share/nginx/html/store:ro
    depends_on:
      - sc-backend-core

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    container_name: minio-local
    ports:
      - "19000:9000"
      - "19001:9001"
    environment:
      - MINIO_ROOT_USER=${S3_ACCESS_KEY}
      - MINIO_ROOT_PASSWORD=${S3_SECRET_KEY}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data_local:/data

  database-backup:
    build:
      context: .
      dockerfile: Dockerfile.backup
    restart: unless-stopped
    container_name: database-backup-local
    environment:
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - S3_ENDPOINT=${S3_ENDPOINT}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY}
      - S3_SECRET_KEY=${S3_SECRET_KEY}
      - S3_BUCKET_BACKUPS=${S3_BUCKET_BACKUPS}
      - BACKUP_INTERVAL_HOURS=12
      - RUN_ONCE=false
    depends_on:
      - postgres-db
      - minio

volumes:
  postgres_data_local:
  minio_data_local:
