services:
  web:
    build: .
    ports:
      - "80:80"
      - "443:443"
    restart: unless-stopped
    container_name: web-prod
    volumes:
      # Mount SSL certificates (update path to your certificates)
      - ./ssl:/etc/nginx/ssl:ro
    environment:
      - VIRTUAL_HOST=${DOMAIN},www.${DOMAIN}
      - LETSENCRYPT_HOST=${DOMAIN},www.${DOMAIN}
      - LETSENCRYPT_EMAIL=${LETSENCRYPT_EMAIL}
      - BACKEND_HOST=sc-backend-core
    networks:
      - web
    depends_on:
      - sc-backend-core

  sc-backend-core:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    container_name: backend-core-prod
    environment:
      - PORT=3000
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - SHOPIFY_SHOP_NAME=${SHOPIFY_SHOP_NAME}
      - SHOPIFY_ACCESS_TOKEN=${SHOPIFY_ACCESS_TOKEN}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - S3_ENDPOINT=${S3_ENDPOINT}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY}
      - S3_SECRET_KEY=${S3_SECRET_KEY}
      - S3_BUCKET_MEDIA=${S3_BUCKET_MEDIA}
      - BRAND_STYLED_DASHBOARD_ENABLED=${BRAND_STYLED_DASHBOARD_ENABLED:-true}
    networks:
      - web
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.sc-api-${DOKPLOY_COMPOSE_ID_SC}.rule=Host(`${API_DOMAIN}`)"
      - "traefik.http.routers.sc-api-${DOKPLOY_COMPOSE_ID_SC}.entrypoints=websecure"
      - "traefik.http.routers.sc-api-${DOKPLOY_COMPOSE_ID_SC}.tls.certresolver=letsencrypt"
      - "traefik.http.services.sc-api-${DOKPLOY_COMPOSE_ID_SC}.loadbalancer.server.port=3000"
      - "traefik.http.routers.sc-api-${DOKPLOY_COMPOSE_ID_SC}-http.rule=Host(`${API_DOMAIN}`)"
      - "traefik.http.routers.sc-api-${DOKPLOY_COMPOSE_ID_SC}-http.entrypoints=web"
      - "traefik.http.routers.sc-api-${DOKPLOY_COMPOSE_ID_SC}-http.middlewares=redirect-to-https-${DOKPLOY_COMPOSE_ID_SC}"
    depends_on:
      - postgres-db
      - minio

  postgres-db:
    image: postgres:16-alpine
    restart: unless-stopped
    container_name: postgres-db-prod
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    networks:
      - web

  web-dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dash
    ports:
      - "8082:80"
      - "8444:443"
    restart: unless-stopped
    container_name: web-dashboard-prod
    volumes:
      # Mount SSL certificates (update path to your certificates)
      - ./ssl:/etc/nginx/ssl:ro
    environment:
      - VIRTUAL_HOST=${DASH_DOMAIN}
      - LETSENCRYPT_HOST=${DASH_DOMAIN}
      - LETSENCRYPT_EMAIL=${LETSENCRYPT_EMAIL}
      - BACKEND_HOST=sc-backend-core
      - MINIO_HOST=minio
    networks:
      - web
    depends_on:
      - sc-backend-core

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    container_name: minio-prod
    ports:
      - "19000:9000"
      - "19001:9001"
    environment:
      - MINIO_ROOT_USER=${S3_ACCESS_KEY}
      - MINIO_ROOT_PASSWORD=${S3_SECRET_KEY}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data_prod:/data
    networks:
      - web

  database-backup:
    build:
      context: .
      dockerfile: Dockerfile.backup
    restart: unless-stopped
    container_name: database-backup-prod
    environment:
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - S3_ENDPOINT=${S3_ENDPOINT}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY}
      - S3_SECRET_KEY=${S3_SECRET_KEY}
      - S3_BUCKET_BACKUPS=${S3_BUCKET_BACKUPS}
      - BACKUP_INTERVAL_HOURS=12
      - RUN_ONCE=false
    networks:
      - web
    depends_on:
      - postgres-db
      - minio

volumes:
  postgres_data_prod:
  minio_data_prod:

networks:
  web:
    driver: bridge
