services:
  web:
    build: .
    restart: unless-stopped
    container_name: web
    expose:
      - "80"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.stricktly-coffee-${DOKPLOY_COMPOSE_ID_SC}.rule=Host(`${DOMAIN}`) || Host(`www.${DOMAIN}`)"
      - "traefik.http.routers.stricktly-coffee-${DOKPLOY_COMPOSE_ID_SC}.entrypoints=websecure"
      - "traefik.http.routers.stricktly-coffee-${DOKPLOY_COMPOSE_ID_SC}.tls.certresolver=letsencrypt"
      - "traefik.http.services.stricktly-coffee-${DOKPLOY_COMPOSE_ID_SC}.loadbalancer.server.port=80"
      - "traefik.http.routers.stricktly-coffee-${DOKPLOY_COMPOSE_ID_SC}-http.rule=Host(`${DOMAIN}`) || Host(`www.${DOMAIN}`)"
      - "traefik.http.routers.stricktly-coffee-${DOKPLOY_COMPOSE_ID_SC}-http.entrypoints=web"
      - "traefik.http.routers.stricktly-coffee-${DOKPLOY_COMPOSE_ID_SC}-http.middlewares=redirect-to-https-${DOKPLOY_COMPOSE_ID_SC}"
      - "traefik.http.middlewares.redirect-to-https-${DOKPLOY_COMPOSE_ID_SC}.redirectscheme.scheme=https"
    networks:
      - dokploy-network
    depends_on:
      - backend-core

  web-warehouse:
    build:
      context: .
      dockerfile: Dockerfile.warehouse
    restart: unless-stopped
    container_name: web-warehouse
    expose:
      - "80"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.web-warehouse-${DOKPLOY_COMPOSE_ID_SC}.rule=Host(`${PESADO_DOMAIN}`)"
      - "traefik.http.routers.web-warehouse-${DOKPLOY_COMPOSE_ID_SC}.entrypoints=websecure"
      - "traefik.http.routers.web-warehouse-${DOKPLOY_COMPOSE_ID_SC}.tls.certresolver=letsencrypt"
      - "traefik.http.services.web-warehouse-${DOKPLOY_COMPOSE_ID_SC}.loadbalancer.server.port=80"
      - "traefik.http.routers.web-warehouse-${DOKPLOY_COMPOSE_ID_SC}-http.rule=Host(`${PESADO_DOMAIN}`)"
      - "traefik.http.routers.web-warehouse-${DOKPLOY_COMPOSE_ID_SC}-http.entrypoints=web"
      - "traefik.http.routers.web-warehouse-${DOKPLOY_COMPOSE_ID_SC}-http.middlewares=redirect-to-https-warehouse-${DOKPLOY_COMPOSE_ID_SC}"
      - "traefik.http.middlewares.redirect-to-https-warehouse-${DOKPLOY_COMPOSE_ID_SC}.redirectscheme.scheme=https"
    networks:
      - dokploy-network
    depends_on:
      - backend-core

  backend-core:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    container_name: backend-core
    environment:
      - PORT=3000
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - SHOPIFY_SHOP_NAME=${SHOPIFY_SHOP_NAME}
      - SHOPIFY_ACCESS_TOKEN=${SHOPIFY_ACCESS_TOKEN}
    networks:
      - dokploy-network

networks:
  dokploy-network:
    external: true
