services:
  web:
    build: .
    restart: unless-stopped
    container_name: web
    expose:
      - "80"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.stricktly-coffee-${DOKPLOY_COMPOSE_ID_SC}.rule=Host(`${DOMAIN}`) || Host(`www.${DOMAIN}`)"
      - "traefik.http.routers.stricktly-coffee-${DOKPLOY_COMPOSE_ID_SC}.entrypoints=websecure"
      - "traefik.http.routers.stricktly-coffee-${DOKPLOY_COMPOSE_ID_SC}.tls.certresolver=letsencrypt"
      - "traefik.http.services.stricktly-coffee-${DOKPLOY_COMPOSE_ID_SC}.loadbalancer.server.port=80"
      - "traefik.http.routers.stricktly-coffee-${DOKPLOY_COMPOSE_ID_SC}-http.rule=Host(`${DOMAIN}`) || Host(`www.${DOMAIN}`)"
      - "traefik.http.routers.stricktly-coffee-${DOKPLOY_COMPOSE_ID_SC}-http.entrypoints=web"
      - "traefik.http.routers.stricktly-coffee-${DOKPLOY_COMPOSE_ID_SC}-http.middlewares=redirect-to-https-${DOKPLOY_COMPOSE_ID_SC}"
      - "traefik.http.middlewares.redirect-to-https-${DOKPLOY_COMPOSE_ID_SC}.redirectscheme.scheme=https"
    networks:
      - dokploy-network
    depends_on:
      - backend-core

  web-warehouse:
    build:
      context: .
      dockerfile: Dockerfile.warehouse
    restart: unless-stopped
    container_name: web-warehouse
    expose:
      - "80"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.web-warehouse-${DOKPLOY_COMPOSE_ID_SC}.rule=Host(`${PESADO_DOMAIN}`)"
      - "traefik.http.routers.web-warehouse-${DOKPLOY_COMPOSE_ID_SC}.entrypoints=websecure"
      - "traefik.http.routers.web-warehouse-${DOKPLOY_COMPOSE_ID_SC}.tls.certresolver=letsencrypt"
      - "traefik.http.services.web-warehouse-${DOKPLOY_COMPOSE_ID_SC}.loadbalancer.server.port=80"
      - "traefik.http.routers.web-warehouse-${DOKPLOY_COMPOSE_ID_SC}-http.rule=Host(`${PESADO_DOMAIN}`)"
      - "traefik.http.routers.web-warehouse-${DOKPLOY_COMPOSE_ID_SC}-http.entrypoints=web"
      - "traefik.http.routers.web-warehouse-${DOKPLOY_COMPOSE_ID_SC}-http.middlewares=redirect-to-https-warehouse-${DOKPLOY_COMPOSE_ID_SC}"
      - "traefik.http.middlewares.redirect-to-https-warehouse-${DOKPLOY_COMPOSE_ID_SC}.redirectscheme.scheme=https"
    networks:
      - dokploy-network
    depends_on:
      - backend-core

  backend-core:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    container_name: backend-core
    environment:
      - PORT=3000
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - SHOPIFY_SHOP_NAME=${SHOPIFY_SHOP_NAME}
      - SHOPIFY_ACCESS_TOKEN=${SHOPIFY_ACCESS_TOKEN}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
    volumes:
      - uploads_data:/app/uploads
    networks:
      - dokploy-network
    depends_on:
      - postgres-db

  postgres-db:
    image: postgres:16-alpine
    restart: unless-stopped
    container_name: postgres-db
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - dokploy-network

  web-admin:
    build:
      context: .
      dockerfile: Dockerfile.admin
    restart: unless-stopped
    container_name: web-admin
    expose:
      - "80"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.web-admin-${DOKPLOY_COMPOSE_ID_SC}.rule=Host(`${ADMIN_DOMAIN}`)"
      - "traefik.http.routers.web-admin-${DOKPLOY_COMPOSE_ID_SC}.entrypoints=websecure"
      - "traefik.http.routers.web-admin-${DOKPLOY_COMPOSE_ID_SC}.tls.certresolver=letsencrypt"
      - "traefik.http.services.web-admin-${DOKPLOY_COMPOSE_ID_SC}.loadbalancer.server.port=80"
      - "traefik.http.routers.web-admin-${DOKPLOY_COMPOSE_ID_SC}-http.rule=Host(`${ADMIN_DOMAIN}`)"
      - "traefik.http.routers.web-admin-${DOKPLOY_COMPOSE_ID_SC}-http.entrypoints=web"
      - "traefik.http.routers.web-admin-${DOKPLOY_COMPOSE_ID_SC}-http.middlewares=redirect-to-https-admin-${DOKPLOY_COMPOSE_ID_SC}"
      - "traefik.http.middlewares.redirect-to-https-admin-${DOKPLOY_COMPOSE_ID_SC}.redirectscheme.scheme=https"
    networks:
      - dokploy-network
    depends_on:
      - backend-core

volumes:
  postgres_data:
  uploads_data:

networks:
  dokploy-network:
    external: true
