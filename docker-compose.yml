services:
  web:
    build: .
    restart: unless-stopped
    container_name: stricktly-coffee
    expose:
      - "80"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.stricktly-coffee.rule=Host(\`stricktlycoffee.be\`) || Host(\`www.stricktlycoffee.be\`) || Host(\`pesado.stricktlycoffee.be\`)"
      - "traefik.http.routers.stricktly-coffee.entrypoints=websecure"
      - "traefik.http.routers.stricktly-coffee.tls.certresolver=letsencrypt"
      - "traefik.http.services.stricktly-coffee.loadbalancer.server.port=80"
      - "traefik.http.routers.stricktly-coffee-http.rule=Host(\`stricktlycoffee.be\`) || Host(\`www.stricktlycoffee.be\`) || Host(\`pesado.stricktlycoffee.be\`)"
      - "traefik.http.routers.stricktly-coffee-http.entrypoints=web"
      - "traefik.http.routers.stricktly-coffee-http.middlewares=redirect-to-https"
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https"
    networks:
      - dokploy-network
    depends_on:
      - backend

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    container_name: stricktly-coffee-backend
    environment:
      - PORT=3000
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - SHOPIFY_SHOP_NAME=${SHOPIFY_SHOP_NAME}
      - SHOPIFY_ACCESS_TOKEN=${SHOPIFY_ACCESS_TOKEN}
    networks:
      - dokploy-network

networks:
  dokploy-network:
    external: true
