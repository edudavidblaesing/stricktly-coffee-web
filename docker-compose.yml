services:
  web:
    build: .
    restart: unless-stopped
    container_name: web
    expose:
      - "80"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.stricktly-coffee-${DOKPLOY_COMPOSE_ID_SC}.rule=Host(`${DOMAIN}`) || Host(`www.${DOMAIN}`) || HostRegexp(`{subdomain:[a-z0-9-]+}.${DOMAIN}`)"
      - "traefik.http.routers.stricktly-coffee-${DOKPLOY_COMPOSE_ID_SC}.entrypoints=websecure"
      - "traefik.http.routers.stricktly-coffee-${DOKPLOY_COMPOSE_ID_SC}.tls.certresolver=letsencrypt"
      - "traefik.http.services.stricktly-coffee-${DOKPLOY_COMPOSE_ID_SC}.loadbalancer.server.port=80"
      - "traefik.http.routers.stricktly-coffee-${DOKPLOY_COMPOSE_ID_SC}-http.rule=Host(`${DOMAIN}`) || Host(`www.${DOMAIN}`) || HostRegexp(`{subdomain:[a-z0-9-]+}.${DOMAIN}`)"
      - "traefik.http.routers.stricktly-coffee-${DOKPLOY_COMPOSE_ID_SC}-http.entrypoints=web"
      - "traefik.http.routers.stricktly-coffee-${DOKPLOY_COMPOSE_ID_SC}-http.middlewares=redirect-to-https-${DOKPLOY_COMPOSE_ID_SC}"
      - "traefik.http.middlewares.redirect-to-https-${DOKPLOY_COMPOSE_ID_SC}.redirectscheme.scheme=https"
    networks:
      - dokploy-network
    depends_on:
      - backend-core

  backend-core:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    container_name: backend-core
    environment:
      - PORT=3000
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - SHOPIFY_SHOP_NAME=${SHOPIFY_SHOP_NAME}
      - SHOPIFY_ACCESS_TOKEN=${SHOPIFY_ACCESS_TOKEN}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - S3_ENDPOINT=${S3_ENDPOINT}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY}
      - S3_SECRET_KEY=${S3_SECRET_KEY}
      - S3_BUCKET_MEDIA=${S3_BUCKET_MEDIA}
    volumes:
      - uploads_data:/app/uploads
    networks:
      - dokploy-network
    depends_on:
      - postgres-db
      - minio

  postgres-db:
    image: postgres:16-alpine
    restart: unless-stopped
    container_name: postgres-db
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - dokploy-network

  web-dashboard:
    build:
      context: .
      dockerfile: Dockerfile.admin
    restart: unless-stopped
    container_name: web-dashboard
    expose:
      - "80"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.web-dashboard-${DOKPLOY_COMPOSE_ID_SC}.rule=Host(`${DASH_DOMAIN}`)"
      - "traefik.http.routers.web-dashboard-${DOKPLOY_COMPOSE_ID_SC}.entrypoints=websecure"
      - "traefik.http.routers.web-dashboard-${DOKPLOY_COMPOSE_ID_SC}.tls.certresolver=letsencrypt"
      - "traefik.http.services.web-dashboard-${DOKPLOY_COMPOSE_ID_SC}.loadbalancer.server.port=80"
      - "traefik.http.routers.web-dashboard-${DOKPLOY_COMPOSE_ID_SC}-http.rule=Host(`${DASH_DOMAIN}`)"
      - "traefik.http.routers.web-dashboard-${DOKPLOY_COMPOSE_ID_SC}-http.entrypoints=web"
      - "traefik.http.routers.web-dashboard-${DOKPLOY_COMPOSE_ID_SC}-http.middlewares=redirect-to-https-dashboard-${DOKPLOY_COMPOSE_ID_SC}"
      - "traefik.http.middlewares.redirect-to-https-dashboard-${DOKPLOY_COMPOSE_ID_SC}.redirectscheme.scheme=https"
    networks:
      - dokploy-network
    depends_on:
      - backend-core

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    container_name: minio
    expose:
      - "9000"
      - "9001"
    environment:
      - MINIO_ROOT_USER=${S3_ACCESS_KEY}
      - MINIO_ROOT_PASSWORD=${S3_SECRET_KEY}
    command: server /data --console-address ":9001"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.minio-console-${DOKPLOY_COMPOSE_ID_SC}.rule=Host(`s3-console.${DOMAIN}`)"
      - "traefik.http.routers.minio-console-${DOKPLOY_COMPOSE_ID_SC}.entrypoints=websecure"
      - "traefik.http.routers.minio-console-${DOKPLOY_COMPOSE_ID_SC}.tls.certresolver=letsencrypt"
      - "traefik.http.services.minio-console-${DOKPLOY_COMPOSE_ID_SC}.loadbalancer.server.port=9001"
      - "traefik.http.routers.minio-console-${DOKPLOY_COMPOSE_ID_SC}-http.rule=Host(`s3-console.${DOMAIN}`)"
      - "traefik.http.routers.minio-console-${DOKPLOY_COMPOSE_ID_SC}-http.entrypoints=web"
      - "traefik.http.routers.minio-console-${DOKPLOY_COMPOSE_ID_SC}-http.middlewares=redirect-to-https-minio-${DOKPLOY_COMPOSE_ID_SC}"
      - "traefik.http.middlewares.redirect-to-https-minio-${DOKPLOY_COMPOSE_ID_SC}.redirectscheme.scheme=https"
    volumes:
      - minio_data:/data
    networks:
      - dokploy-network

  database-backup:
    build:
      context: .
      dockerfile: Dockerfile.backup
    restart: unless-stopped
    container_name: database-backup
    environment:
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - S3_ENDPOINT=${S3_ENDPOINT}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY}
      - S3_SECRET_KEY=${S3_SECRET_KEY}
      - S3_BUCKET_BACKUPS=${S3_BUCKET_BACKUPS}
      - BACKUP_INTERVAL_HOURS=12
      - RUN_ONCE=false
    networks:
      - dokploy-network
    depends_on:
      - postgres-db
      - minio

volumes:
  postgres_data:
  uploads_data:
  minio_data:

networks:
  dokploy-network:
    external: true
