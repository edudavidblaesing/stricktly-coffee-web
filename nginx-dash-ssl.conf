# HTTP server - redirect to HTTPS
server {
    listen 80;
    server_name dash.stricktlycoffee.be dash.dev.stricktlycoffee.be dev-dash.stricktlycoffee.be;
    
    # Redirect all HTTP traffic to HTTPS
    return 301 https://$host$request_uri;
}

# HTTPS server for Admin panel
server {
    listen 443 ssl http2;
    server_name dash.stricktlycoffee.be dash.dev.stricktlycoffee.be dev-dash.stricktlycoffee.be;
    root /usr/share/nginx/html/admin;
    index index.html;

    # SSL certificate paths (reusing same mapped certificates)
    ssl_certificate /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;

    # SSL configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    location / {
        try_files $uri $uri.html $uri/ /index.html;
    }

    # Route Admin panel with /admin prefix
    location /admin {
        root /usr/share/nginx/html;
        try_files $uri $uri.html $uri/ /admin/index.html;
    }

    # Enable gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/javascript image/svg+xml;

    # Cache static assets
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Custom Error Pages
    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;

    # Proxy backend API locally
    location /api/ {
        resolver 127.0.0.11 valid=30s;
        set $upstream_backend http://${BACKEND_HOST}:3000;
        proxy_pass $upstream_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Proxy uploads directly to MinIO S3 media bucket
    location ^~ /uploads/ {
        resolver 127.0.0.11 valid=30s;
        set $upstream_minio http://${MINIO_HOST}:9000;
        rewrite ^/uploads/(.*) /media/$1 break;
        proxy_pass $upstream_minio;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
