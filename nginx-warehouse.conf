server {
    listen 80;
    server_name pesado.stricktlycoffee.be dev-pesado.stricktlycoffee.be pesado.stricktlycoffee.local localhost;
    root /usr/share/nginx/html/pesado;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Route Pesado store with /pesado prefix (supporting redirects from backend/Stripe)
    location /pesado {
        alias /usr/share/nginx/html/pesado;
        try_files $uri $uri/ /pesado/index.html;
    }

    # Enable gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/javascript image/svg+xml;

    # Cache static assets
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Proxy backend API locally
    location /api/ {
        proxy_pass http://backend-core:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}
