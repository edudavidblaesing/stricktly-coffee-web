# HTTP server - redirect to HTTPS
server {
    listen 80;
    server_name stricktlycoffee.be www.stricktlycoffee.be dev.stricktlycoffee.be www.dev.stricktlycoffee.be staging.stricktlycoffee.be;
    
    # Redirect all HTTP traffic to HTTPS
    return 301 https://$host$request_uri;
}

# HTTPS server
server {
    listen 443 ssl http2;
    server_name stricktlycoffee.be www.stricktlycoffee.be dev.stricktlycoffee.be www.dev.stricktlycoffee.be staging.stricktlycoffee.be;
    root /usr/share/nginx/html/web;
    index index.html;

    # SSL certificate paths (update these with your actual certificate paths)
    ssl_certificate /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;

    # SSL configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Redirect www to non-www
    if ($host = 'www.stricktlycoffee.be') {
        return 301 https://stricktlycoffee.be$request_uri;
    }
    if ($host = 'www.dev.stricktlycoffee.be') {
        return 301 https://dev.stricktlycoffee.be$request_uri;
    }

    location / {
        try_files $uri $uri.html $uri/ /index.html;
    }

    # Enable gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/javascript image/svg+xml;

    # Cache static assets
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Custom Error Pages
    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;

    # Disable access logs for favicon and robots.txt
    location = /favicon.ico {
        log_not_found off;
        access_log off;
    }

    location = /robots.txt {
        log_not_found off;
        access_log off;
    }

    # Proxy backend API locally
    location /api/ {
        resolver 127.0.0.11 valid=30s;
        set $upstream_backend http://sc-backend-core:3000;
        proxy_pass $upstream_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}
