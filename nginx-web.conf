# --- 1. Main Portfolio Site (stricktlycoffee.be & stricktlycoffee.local) ---
server {
    listen 80;
    server_name stricktlycoffee.be www.stricktlycoffee.be dev.stricktlycoffee.be www.dev.stricktlycoffee.be staging.stricktlycoffee.be stricktlycoffee.local www.stricktlycoffee.local localhost;
    root /usr/share/nginx/html/web;
    index index.html;

    # Redirect www to non-www
    if ($host = 'www.stricktlycoffee.be') {
        return 301 $scheme://stricktlycoffee.be$request_uri;
    }
    if ($host = 'www.dev.stricktlycoffee.be') {
        return 301 $scheme://dev.stricktlycoffee.be$request_uri;
    }
    if ($host = 'www.stricktlycoffee.local') {
        return 301 $scheme://stricktlycoffee.local$request_uri;
    }

    location / {
        try_files $uri $uri.html $uri/ /index.html;
    }

    location /store/ {
        alias /usr/share/nginx/html/store/;
        try_files $uri $uri.html $uri/ /store/index.html;
    }

    # Enable gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/javascript image/svg+xml;

    # Cache static assets
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Security headers
    # Commented out X-Frame-Options to allow framing from selected dashboard endpoints
    # add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Content-Security-Policy "frame-ancestors 'self' http://localhost:8082 http://localhost:3000 http://localhost:5173 http://api.stricktlycoffee.local https://*.stricktlycoffee.be https://stricktlycoffee.be;" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Custom Error Pages
    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;

    # Disable access logs for favicon and robots.txt
    location = /favicon.ico {
        log_not_found off;
        access_log off;
    }

    location = /robots.txt {
        log_not_found off;
        access_log off;
    }

    # Proxy backend API locally
    location /api/ {
        resolver 127.0.0.11 valid=30s;
        set $upstream_backend http://${BACKEND_HOST}:3000;
        proxy_pass $upstream_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Proxy uploads locally
    location /uploads/ {
        resolver 127.0.0.11 valid=30s;
        set $upstream_backend http://${BACKEND_HOST}:3000;
        proxy_pass $upstream_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
}

# --- 2. Multi-Tenant Shop Storefront Engine (Subdomains & Custom Domains) ---
server {
    listen 80;
    server_name *.stricktlycoffee.be *.stricktlycoffee.local *.dyve.dev; # Default catch-all for any other domain (e.g. custom domain resolved to this Nginx)
    root /usr/share/nginx/html/store;
    index index.html;

    location / {
        try_files $uri $uri.html $uri/ /index.html;
