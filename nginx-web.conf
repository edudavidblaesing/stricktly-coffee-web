# --- Multi-Tenant Shop Storefront Engine (Subdomains & Custom Domains) ---
server {
    listen 80 default_server;
    server_name *.stricktlycoffee.be *.stricktlycoffee.local *.dyve.dev;
    root /usr/share/nginx/html/store;
    index index.html;

    location / {
        try_files $uri $uri.html $uri/ /index.html;
    }

    # Enable gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/javascript image/svg+xml;

    # Cache static assets
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Security headers
    add_header Content-Security-Policy "frame-ancestors 'self' http://localhost:8082 http://localhost:3000 http://localhost:5173 http://api.stricktlycoffee.local https://*.stricktlycoffee.be https://stricktlycoffee.be;" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Custom Error Pages
    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;

    # Disable access logs for favicon and robots.txt
    location = /favicon.ico {
        log_not_found off;
        access_log off;
    }

    location = /robots.txt {
        log_not_found off;
        access_log off;
    }

    # Proxy backend API locally
    location /api/ {
        resolver 127.0.0.11 valid=30s;
        set $upstream_backend http://${BACKEND_HOST}:3000;
        proxy_pass $upstream_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Proxy uploads locally
    location /uploads/ {
        resolver 127.0.0.11 valid=30s;
        set $upstream_backend http://${BACKEND_HOST}:3000;
        proxy_pass $upstream_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
}

# --- Local & Environment Dashboard Router for dash.* subdomains ---
server {
    listen 80;
    server_name dash.stricktlycoffee.be dash.stricktlycoffee.local dev-dash.stricktlycoffee.be dash.dev.stricktlycoffee.be;

    location / {
        resolver 127.0.0.11 valid=30s;
        set $upstream_dash http://web-dashboard:80;
        proxy_pass $upstream_dash;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}


