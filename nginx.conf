server {
    listen 80;
    server_name stricktlycoffee.be www.stricktlycoffee.be staging.stricktlycoffee.be;
    root /usr/share/nginx/html/web;
    index index.html;

    # Redirect www to non-www
    if ($host = 'www.stricktlycoffee.be') {
        return 301 $scheme://stricktlycoffee.be$request_uri;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Enable gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/javascript image/svg+xml;

    # Cache static assets
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Disable access logs for favicon and robots.txt
    location = /favicon.ico {
        log_not_found off;
        access_log off;
    }

    location = /robots.txt {
        log_not_found off;
        access_log off;
    }

    # Route Pesado store locally
    location /pesado {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /pesado/index.html;
    }

    # Proxy backend API locally
    location /api/ {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}

