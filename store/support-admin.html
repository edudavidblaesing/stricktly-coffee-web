<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Support Console</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0d0c;
            --card-bg: #121514;
            --primary: #c5a059;
            --primary-hover: #b08d47;
            --text-main: #f3f4f3;
            --text-muted: #8e9290;
            --border: #232826;
            --success: #10b981;
            --warning: #f59e0b;
            --font-display: 'Space Grotesk', sans-serif;
            --font-body: 'Outfit', sans-serif;
            --transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-body);
            margin: 0;
            padding: 40px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            padding-bottom: 24px;
            margin-bottom: 40px;
        }

        h1, h2, h3, h4 {
            font-family: var(--font-display);
            margin: 0;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: 350px 1fr 300px;
            gap: 30px;
            height: calc(100vh - 200px);
        }

        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .scrollable {
            flex-grow: 1;
            overflow-y: auto;
            margin-top: 16px;
        }

        .ticket-item {
            padding: 16px;
            border: 1px solid var(--border);
            border-radius: 6px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: var(--transition);
        }

        .ticket-item:hover, .ticket-item.active {
            border-color: var(--primary);
            background: #191c1b;
        }

        .ticket-item .subject {
            font-weight: 600;
            margin-bottom: 4px;
        }

        .ticket-item .meta {
            font-size: 0.8rem;
            color: var(--text-muted);
            display: flex;
            justify-content: space-between;
        }

        .chat-box {
            display: flex;
            flex-direction: column;
            flex-grow: 1;
            background: #161918;
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 16px;
            overflow-y: auto;
            gap: 12px;
            margin-bottom: 16px;
        }

        .message {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 6px;
            font-size: 0.95rem;
            line-height: 1.4;
        }

        .message.customer {
            align-self: flex-start;
            background-color: var(--border);
            color: var(--text-main);
        }

        .message.agent {
            align-self: flex-end;
            background-color: var(--primary);
            color: var(--bg-color);
        }

        .input-field {
            width: 100%;
            padding: 12px 16px;
            background: #191c1b;
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--text-main);
            font-family: var(--font-body);
            box-sizing: border-box;
        }

        .btn {
            background-color: var(--primary);
            color: var(--bg-color);
            padding: 12px 24px;
            font-family: var(--font-display);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: var(--transition);
        }

        .btn:hover {
            background-color: var(--primary-hover);
        }

        .btn-warning {
            background-color: var(--warning);
        }

        .btn-warning:hover {
            background-color: #d97706;
        }

        .badge {
            font-size: 0.75rem;
            font-weight: 700;
            padding: 4px 8px;
            border-radius: 4px;
            text-transform: uppercase;
        }

        .badge-open { background: rgba(239, 68, 68, 0.2); color: #ef4444; }
        .badge-resolved { background: rgba(16, 185, 129, 0.2); color: #10b981; }

        .simulation-panel {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .form-group {
            margin-bottom: 12px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .form-group label {
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: 600;
        }
    </style>
</head>
<body>
    <header>
        <div>
            <h1>Customer Support Console</h1>
            <span style="font-size: 0.9rem; color: var(--text-muted);">Real-time Support Agent Inbox</span>
        </div>
        <button class="btn btn-warning" onclick="toggleSimulator()">Simulation Toolkit</button>
    </header>

    <div class="dashboard-grid">
        <!-- Tickets list -->
        <div class="card">
            <h3>Support Tickets</h3>
            <div class="scrollable" id="tickets-list">
                <div style="color: var(--text-muted); text-align: center; padding-top: 40px;">Loading tickets...</div>
            </div>
        </div>

        <!-- Chat Workspace -->
        <div class="card" id="chat-workspace" style="visibility: hidden;">
            <h3 id="chat-subject">Select a ticket to begin</h3>
            <div id="chat-meta" style="font-size: 0.85rem; color: var(--text-muted); margin-bottom: 12px;"></div>
            <div class="chat-box" id="chat-box"></div>
            
            <form onsubmit="sendReply(event)" style="display: flex; gap: 12px;">
                <input type="text" id="reply-input" class="input-field" placeholder="Type response here..." required>
                <button type="submit" class="btn">Send</button>
            </form>
        </div>

        <!-- Email Ingestion Simulator Panel -->
        <div class="card" id="simulator-card" style="display: none;">
            <h3>Email Ingestion Simulator</h3>
            <p style="font-size: 0.85rem; color: var(--text-muted); margin-bottom: 16px;">Simulate a customer sending a fresh query or replying to a ticket thread via SMTP email.</p>
            <div class="simulation-panel">
                <div class="form-group">
                    <label>From (Customer Email)</label>
                    <input type="email" id="sim-from" class="input-field" value="client@example.com" required>
                </div>
                <div class="form-group">
                    <label>To (System Intake Router)</label>
                    <input type="email" id="sim-to" class="input-field" value="support@stricktlycoffee.be" required>
                </div>
                <div class="form-group">
                    <label>Subject</label>
                    <input type="text" id="sim-subject" class="input-field" value="Question about espresso baskets" required>
                </div>
                <div class="form-group">
                    <label>Email Body Text</label>
                    <textarea id="sim-text" class="input-field" rows="4" required>Hi, does the spring loaded tamper fit my standard E61 group basket?</textarea>
                </div>
                <button class="btn btn-warning" onclick="simulateIncomingEmail()">Fire Email Trigger</button>
            </div>
        </div>
    </div>

    <script>
        const getApiUrl = () => {
            const hostname = window.location.hostname;
            if (hostname.includes('8081')) return 'http://localhost:3000';
            return '';
        };
        const getWsUrl = () => {
            const hostname = window.location.hostname;
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            // Connect to local backend port 3000 if running locally, otherwise use Nginx proxy
            if (hostname === 'localhost' || hostname.includes('local')) {
                return `${protocol}//${hostname}:3000`;
            }
            return `${protocol}//${window.location.host}/api/ws`;
        };

        const apiBase = getApiUrl();
        const wsBase = getWsUrl();

        const urlParams = new URLSearchParams(window.location.search);
        let token = urlParams.get('token') || localStorage.getItem('sc_admin_token');
        if (urlParams.get('token')) {
            localStorage.setItem('sc_admin_token', urlParams.get('token'));
        }

        let selectedTicketId = null;
        let ws;

        async function fetchTickets() {
            try {
                const res = await fetch(`${apiBase}/api/admin/support/tickets`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (res.status === 401) {
                    document.getElementById('tickets-list').innerHTML = `<div style="color: #ef4444; text-align: center;">🚫 Access Denied: Authenticate via Admin Hub first.</div>`;
                    return;
                }
                const tickets = await res.json();
                renderTickets(tickets);
            } catch (err) {
                console.error('Failed to load tickets:', err);
            }
        }

        function renderTickets(tickets) {
            const list = document.getElementById('tickets-list');
            if (tickets.length === 0) {
                list.innerHTML = '<div style="color: var(--text-muted); text-align: center;">No tickets active.</div>';
                return;
            }
            list.innerHTML = '';
            tickets.forEach(ticket => {
                const item = document.createElement('div');
                item.className = `ticket-item ${ticket.id === selectedTicketId ? 'active' : ''}`;
                item.onclick = () => selectTicket(ticket.id, ticket.subject, ticket.customer_email, ticket.status);
                
                item.innerHTML = `
                    <div class="subject">${ticket.subject}</div>
                    <div class="meta">
                        <span>${ticket.customer_email}</span>
                        <span class="badge badge-${ticket.status}">${ticket.status}</span>
                    </div>
                `;
                list.appendChild(item);
            });
        }

        async function selectTicket(id, subject, email, status) {
            selectedTicketId = id;
            document.getElementById('chat-workspace').style.visibility = 'visible';
            document.getElementById('chat-subject').textContent = subject;
            document.getElementById('chat-meta').textContent = `Customer: ${email} | Status: ${status.toUpperCase()}`;
            
            // Mark active ticket in list
            document.querySelectorAll('.ticket-item').forEach(el => el.classList.remove('active'));
            fetchTickets();

            // Load messages
            try {
                const res = await fetch(`${apiBase}/api/support/tickets/${id}/messages`);
                const data = await res.json();
                
                const chatBox = document.getElementById('chat-box');
                chatBox.innerHTML = '';
                data.messages.forEach(msg => {
                    appendMessage(msg.sender, msg.message_body);
                });

                // Set up simulator routing if replying to existing ticket
                document.getElementById('sim-to').value = `reply+${id}@stricktlycoffee.be`;
                document.getElementById('sim-subject').value = `Re: [#${id.substring(0,8)}] ${subject}`;

                // Connect WS
                connectWebSocket(id);
            } catch (err) {
                console.error(err);
            }
        }

        function appendMessage(sender, body) {
            const chatBox = document.getElementById('chat-box');
            const msgEl = document.createElement('div');
            msgEl.className = `message ${sender}`;
            msgEl.textContent = body;
            chatBox.appendChild(msgEl);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function connectWebSocket(id) {
            if (ws) ws.close();
            ws = new WebSocket(`${wsBase}?ticketId=${id}`);
            
            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                if (data.sender !== 'agent') {
                    appendMessage(data.sender, data.messageBody);
                }
            };
        }

        async function sendReply(e) {
            e.preventDefault();
            const input = document.getElementById('reply-input');
            const body = input.value;
            if (!body || !selectedTicketId) return;

            appendMessage('agent', body);
            input.value = '';

            try {
                await fetch(`${apiBase}/api/support/tickets/${selectedTicketId}/reply`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ sender: 'agent', messageBody: body })
                });
            } catch (err) {
                console.error('Failed to send reply:', err);
            }
        }

        function toggleSimulator() {
            const sim = document.getElementById('simulator-card');
            sim.style.display = sim.style.display === 'none' ? 'flex' : 'none';
        }

        async function simulateIncomingEmail() {
            const from = document.getElementById('sim-from').value;
            const to = document.getElementById('sim-to').value;
            const subject = document.getElementById('sim-subject').value;
            const text = document.getElementById('sim-text').value;

            try {
                const res = await fetch(`${apiBase}/api/admin/simulate-incoming-email`, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ from, to, subject, text })
                });
                const data = await res.json();
                if (data.success) {
                    alert('Email received and parsed successfully!');
                    fetchTickets();
                    if (selectedTicketId) {
                        selectTicket(selectedTicketId, document.getElementById('chat-subject').textContent, document.getElementById('sim-from').value, 'open');
                    }
                } else {
                    alert('Simulator failed to ingest email');
                }
            } catch (err) {
                alert(`Simulation error: ${err.message}`);
            }
        }

        // Global Alert WebSockets for real-time ticket alerts
        const globalAlertWs = new WebSocket(`${wsBase}?ticketId=global-admin-alerts`);
        globalAlertWs.onmessage = (event) => {
            const data = JSON.parse(event.data);
            if (data.type === 'new_ticket') {
                fetchTickets();
            } else if (data.type === 'message_alert' && data.ticketId === selectedTicketId) {
                if (data.sender !== 'agent') {
                    appendMessage(data.sender, data.messageBody);
                }
            }
        };

        // Load initially
        fetchTickets();
    </script>
</body>
</html>
