<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WMS | Warehouse & Fulfillment Dashboard</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0d0f0e;
            --card-bg: #131716;
            --primary: #ef4444;
            --primary-hover: #dc2626;
            --success: #10b981;
            --text-main: #f3f4f3;
            --text-muted: #8e9290;
            --accent: #1e2221;
            --border: #232826;
            --font-display: 'Space Grotesk', sans-serif;
            --font-body: 'Outfit', sans-serif;
            --transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-body);
            margin: 0;
            padding: 40px 24px;
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            padding-bottom: 24px;
            margin-bottom: 40px;
        }

        h1, h2, h3, h4 {
            font-family: var(--font-display);
            margin: 0;
        }

        .layout-container {
            display: grid;
            grid-template-columns: 1fr 400px;
            gap: 30px;
        }

        @media(max-width: 1024px) {
            .layout-container {
                grid-template-columns: 1fr;
            }
        }

        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 30px;
            margin-bottom: 24px;
        }

        .order-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            border-bottom: 1px solid var(--border);
            padding-bottom: 16px;
            margin-bottom: 20px;
        }

        .order-id {
            font-family: monospace;
            font-size: 1.1rem;
            font-weight: 700;
        }

        .shopify-ref {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .status-badge {
            font-size: 0.75rem;
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 0.05em;
            padding: 4px 10px;
            border-radius: 2px;
        }

        .status-pending { background-color: #f59e0b; color: #000; }
        .status-paid { background-color: #3b82f6; color: #fff; }
        .status-processing { background-color: #8b5cf6; color: #fff; }
        .status-shipped { background-color: var(--success); color: #fff; }

        .order-body {
            display: grid;
            grid-template-columns: 1.2fr 1fr;
            gap: 32px;
        }

        @media(max-width: 768px) {
            .order-body {
                grid-template-columns: 1fr;
            }
        }

        .items-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .item-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255,255,255,0.03);
            font-size: 0.95rem;
        }

        .item-qty {
            color: var(--primary);
            font-weight: 700;
            margin-right: 8px;
        }

        .address-box {
            font-size: 0.95rem;
            line-height: 1.5;
        }

        .fulfillment-form {
            background-color: var(--accent);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .input-row {
            display: flex;
            gap: 12px;
        }

        .input-field {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        label {
            font-size: 0.75rem;
            text-transform: uppercase;
            color: var(--text-muted);
            font-weight: 600;
        }

        input, select {
            padding: 10px 14px;
            background: var(--bg-color);
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--text-main);
            font-family: var(--font-body);
            font-size: 0.9rem;
        }

        .btn {
            padding: 12px 20px;
            font-family: var(--font-display);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            border-radius: 4px;
            border: none;
            cursor: pointer;
            transition: var(--transition);
        }

        .btn-success {
            background-color: var(--success);
            color: var(--bg-color);
        }

        .btn-success:hover {
            background-color: #059669;
        }

        .no-orders {
            text-align: center;
            padding: 80px;
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-muted);
        }

        .stock-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
            margin-top: 16px;
        }

        .stock-table th, .stock-table td {
            text-align: left;
            padding: 10px 8px;
            border-bottom: 1px solid var(--border);
        }

        .stock-table th {
            color: var(--text-muted);
            text-transform: uppercase;
            font-size: 0.75rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div>
                <h1>Warehouse Management System (WMS)</h1>
                <div style="margin-top: 4px; font-size: 0.9rem; color: var(--text-muted);">
                    Direct Physical Stock Control & Picker Ingestion Queue
                </div>
            </div>
            <span class="status-badge status-shipped">WMS Mode Active</span>
        </header>

        <div class="layout-container">
            <!-- Order Picking Queue -->
            <div>
                <h3 style="margin-bottom: 20px;">Picking & Dispatch Queue</h3>
                <div class="orders-grid" id="orders-container">
                    <div class="no-orders">Loading pick queue...</div>
                </div>
            </div>

            <!-- Inventory Sidebar -->
            <div>
                <div class="card">
                    <h3>Physical Inventory Levels</h3>
                    <table class="stock-table">
                        <thead>
                            <tr>
                                <th>SKU</th>
                                <th>Location</th>
                                <th>On Hand</th>
                                <th>Allocated</th>
                            </tr>
                        </thead>
                        <tbody id="inventory-body">
                            <tr>
                                <td colspan="4" style="color: var(--text-muted); text-align: center;">Loading stock...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <div class="card">
                    <h3>Adjust Inventory Count</h3>
                    <form onsubmit="adjustStock(event)" style="display: flex; flex-direction: column; gap: 14px;">
                        <div class="form-group" style="display: flex; flex-direction: column; gap: 6px;">
                            <label>Product SKU</label>
                            <select id="adj-sku" required>
                                <option value="PSD-HD-SCREEN">PSD-HD-SCREEN</option>
                                <option value="PSD-MAG-RING">PSD-MAG-RING</option>
                                <option value="PSD-SPRING-TAMPER">PSD-SPRING-TAMPER</option>
                                <option value="PSD-HD-BREVILLE">PSD-HD-BREVILLE</option>
                            </select>
                        </div>
                        <div class="input-row">
                            <div class="input-field">
                                <label>Bin Location</label>
                                <input type="text" id="adj-bin" placeholder="e.g. A-12" required>
                            </div>
                            <div class="input-field">
                                <label>Quantity On Hand</label>
                                <input type="number" id="adj-qty" min="0" value="100" required>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-success" style="margin-top: 10px;">Update Stock Level</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script>
        const container = document.getElementById('orders-container');
        const inventoryBody = document.getElementById('inventory-body');
        
        const getApiBaseUrl = () => {
            const hostname = window.location.hostname;
            if (hostname.includes('8081')) return 'http://localhost:3000';
            return '';
        };
        const apiBaseUrl = getApiBaseUrl();

        const urlParams = new URLSearchParams(window.location.search);
        let token = urlParams.get('token') || localStorage.getItem('sc_admin_token');
        const previewBrandId = urlParams.get('previewBrandId') || '';
        if (urlParams.get('token')) {
            localStorage.setItem('sc_admin_token', urlParams.get('token'));
        }

        async function fetchOrders() {
            if (!token) {
                renderAccessDenied();
                return;
            }
            try {
                const url = previewBrandId ? `${apiBaseUrl}/api/admin/orders?previewBrandId=${previewBrandId}` : `${apiBaseUrl}/api/admin/orders`;
                const res = await fetch(url, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (res.status === 401) {
                    renderAccessDenied();
                    return;
                }
                if (!res.ok) throw new Error('Failed to fetch orders');
                const orders = await res.json();
                renderOrders(orders);
            } catch (err) {
                container.innerHTML = `<div class="no-orders">Failed to load orders: ${err.message}</div>`;
            }
        }

        async function fetchWmsInventory() {
            if (!token) return;
            try {
                const res = await fetch(`${apiBaseUrl}/api/admin/wms/inventory`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (res.ok) {
                    const stock = await res.json();
                    renderInventory(stock);
                }
            } catch (err) {
                console.error('Failed to fetch WMS stock:', err);
            }
        }

        function renderInventory(stock) {
            if (stock.length === 0) {
                inventoryBody.innerHTML = '<tr><td colspan="4" style="text-align: center; color: var(--text-muted);">No stock recorded.</td></tr>';
                return;
            }
            inventoryBody.innerHTML = '';
            stock.forEach(item => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td style="font-weight: 600;">${item.sku}</td>
                    <td><span style="font-family: monospace; background: var(--accent); padding: 4px 8px; border-radius: 4px;">${item.bin_location}</span></td>
                    <td style="color: var(--success); font-weight: 700;">${item.quantity_on_hand}</td>
                    <td style="color: var(--primary); font-weight: 700;">${item.quantity_reserved}</td>
                `;
                inventoryBody.appendChild(row);
            });
        }

        async function adjustStock(e) {
            e.preventDefault();
            const sku = document.getElementById('adj-sku').value;
            const binLocation = document.getElementById('adj-bin').value;
            const quantityOnHand = parseInt(document.getElementById('adj-qty').value);

            try {
                const res = await fetch(`${apiBaseUrl}/api/admin/wms/inventory/update`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ sku, binLocation, quantityOnHand })
                });
                if (res.ok) {
                    alert('Stock level adjusted successfully!');
                    fetchWmsInventory();
                } else {
                    alert('Failed to update stock');
                }
            } catch (err) {
                alert(`Error: ${err.message}`);
            }
        }

        function renderAccessDenied() {
            container.innerHTML = `
                <div class="no-orders" style="border: 1px dashed #ef4444; background: rgba(239, 68, 68, 0.05); padding: 40px; border-radius: 8px;">
                    <div style="font-size: 2rem; margin-bottom: 12px;">🚫</div>
                    <strong style="color: #ef4444; font-size: 1.1rem; display: block; margin-bottom: 8px;">Access Denied: Unauthorized Session</strong>
                    This warehouse interface is restricted. Please authenticate via the Stricktly Coffee Admin Hub to access.
                </div>
            `;
        }

        function renderOrders(orders) {
            if (orders.length === 0) {
                container.innerHTML = '<div class="no-orders">No orders recorded in the system. Place an order on the storefront first.</div>';
                return;
            }

            container.innerHTML = '';
            orders.forEach(order => {
                const card = document.createElement('div');
                card.className = 'card';
                
                const itemsHtml = order.items.map(item => `
                    <li class="item-row">
                        <span><span class="item-qty">${item.quantity}x</span>${item.title}</span>
                        <span style="color: var(--text-muted);">€${(item.price * item.quantity).toFixed(2)}</span>
                    </li>
                `).join('');

                let addressHtml = 'No shipping address provided.';
                if (order.shipping_address) {
                    const addr = order.shipping_address;
                    const line1 = addr.address?.line1 || addr.line1 || '';
                    const line2 = addr.address?.line2 || addr.line2 || '';
                    const city = addr.address?.city || addr.city || '';
                    const zip = addr.address?.postal_code || addr.postal_code || '';
                    const country = addr.address?.country || addr.country || '';
                    
                    addressHtml = `
                        <strong>${order.customer_name}</strong><br>
                        ${line1}${line2 ? ', ' + line2 : ''}<br>
                        ${zip} ${city}<br>
                        ${country}
                    `;
                }

                let statusClass = 'status-pending';
                let statusLabel = order.status;
                if (order.status === 'paid') {
                    statusClass = 'status-paid';
                    statusLabel = 'Paid';
                } else if (order.status === 'sent_to_warehouse') {
                    statusClass = 'status-processing';
                    statusLabel = 'Processing';
                } else if (order.status === 'shipped') {
                    statusClass = 'status-shipped';
                    statusLabel = 'Shipped';
                } else if (order.status === 'pending_payment') {
                    statusClass = 'status-pending';
                    statusLabel = 'Unpaid';
                }

                const isShipped = order.status === 'shipped';

                card.innerHTML = `
                    <div class="order-header">
                        <div>
                            <span class="order-id">Order ID: ${order.id}</span>
                            <div class="shopify-ref">Intake Reference: ${order.shopify_order_id || 'System Local'}</div>
                        </div>
                        <span class="status-badge ${statusClass}">${statusLabel}</span>
                    </div>
                    <div class="order-body">
                        <div>
                            <div class="order-items" style="margin-bottom: 24px;">
                                <h4 style="margin: 0 0 10px 0; color: var(--text-muted); font-size: 0.8rem; text-transform: uppercase;">Items to Pick</h4>
                                <ul class="items-list">
                                    ${itemsHtml}
                                </ul>
                            </div>
                            <div class="order-shipping">
                                <h4 style="margin: 0 0 10px 0; color: var(--text-muted); font-size: 0.8rem; text-transform: uppercase;">Shipment Destination</h4>
                                <div class="address-box">
                                    ${addressHtml}
                                </div>
                            </div>
                        </div>
                        <div>
                            <div class="fulfillment-form">
                                <h4 style="margin: 0; color: var(--text-muted); font-size: 0.8rem; text-transform: uppercase;">Picker Dispatch Integration</h4>
                                ${isShipped ? `
                                    <div style="color: var(--success); font-weight: 600; font-size: 0.95rem; display: flex; flex-direction: column; gap: 8px;">
                                        <span>✓ Dispatch Complete</span>
                                        <span style="font-size: 0.85rem; color: var(--text-muted);">Carrier: ${order.tracking_carrier}</span>
                                        <span style="font-size: 0.85rem; color: var(--text-muted);">Code: ${order.tracking_number}</span>
                                    </div>
                                ` : `
                                    <form onsubmit="fulfillOrder(event, '${order.id}')" style="display: flex; flex-direction: column; gap: 14px;">
                                        <div class="input-row">
                                            <div class="input-field">
                                                <label>Carrier</label>
                                                <select id="carrier-${order.id}">
                                                    <option value="DHL Express">DHL Express</option>
                                                    <option value="FedEx Premium">FedEx Premium</option>
                                                    <option value="UPS Ground">UPS Ground</option>
                                                </select>
                                            </div>
                                            <div class="input-field">
                                                <label>Tracking Code</label>
                                                <input type="text" id="tracking-${order.id}" required placeholder="e.g. AWB87192">
                                            </div>
                                        </div>
                                        <button type="submit" class="btn btn-success" style="width: 100%;" ${order.status === 'pending_payment' ? 'disabled title="Cannot dispatch unpaid orders"' : ''}>Fulfill and Deduct Inventory</button>
                                    </form>
                                `}
                            </div>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        async function fulfillOrder(e, orderId) {
            e.preventDefault();
            const carrier = document.getElementById(`carrier-${orderId}`).value;
            const tracking = document.getElementById(`tracking-${orderId}`).value;

            try {
                const url = previewBrandId ? `${apiBaseUrl}/api/admin/fulfill?previewBrandId=${previewBrandId}` : `${apiBaseUrl}/api/admin/fulfill`;
                const res = await fetch(url, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        orderId,
                        trackingNumber: tracking,
                        trackingCarrier: carrier
                    })
                });

                if (res.ok) {
                    fetchOrders();
                    fetchWmsInventory();
                } else {
                    const err = await res.json();
                    alert(`Fulfillment simulation failed: ${err.error}`);
                }
            } catch (err) {
                alert(`Network error: ${err.message}`);
            }
        }

        // Load initially
        fetchOrders();
        fetchWmsInventory();
    </script>
</body>
</html>
